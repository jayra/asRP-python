apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: asrp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          # Comentario: imagen desde tu registry local de kind (localhost:5001).
          image: localhost:5001/asrp-api-gateway:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: api-gateway-config
          ports:
            - name: http
              containerPort: 4000

          # Comentario: gateway arranca rápido, probes HTTP directos.
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
