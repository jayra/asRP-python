#version: "3.9"

name: asrp

services:
  # -----------------------------
  # API Gateway (Express)
  # -----------------------------
  api-gateway:
    # CAMBIO: ruta real según tu repo
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    image: asrp/api-gateway:${ASRP_IMAGE_TAG:-dev}
    env_file:
      # CAMBIO: envs/secretos "prod-like" fuera de Git (nuevos ficheros)
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      # OIDC (OpenID Connect) issuer externo (para navegador/frontend)
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}

      OIDC_ISSUER_EXPECTED: ${OIDC_ISSUER_EXPECTED:-${OIDC_ISSUER_URL}}  # [FIX] iss esperado (externo)
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/asrp/protocol/openid-connect/certs}  # [FIX] JWKS interno (docker)

      # JWT (JSON Web Token) aud (audience) por ruta
      AUD_CATALOG: ${AUD_CATALOG:-catalog-api}
      AUD_ORDERS: ${AUD_ORDERS:-orders-api}

      # Logs/correlation
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-Id}

      NODE_ENV: production
      UPSTREAM_TIMEOUT_MS: ${UPSTREAM_TIMEOUT_MS:-8000}

    depends_on:
      catalog-api:
        condition: service_healthy
      orders-api:
        condition: service_healthy

    ports:
      # CAMBIO: solo publicamos gateway
      - "4000:4000"

    networks:
      - asrp-edge
      - asrp-back

    healthcheck:
      # Ajusta endpoint si tu gateway usa otro (por defecto /health)
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health', r=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # -----------------------------
  # keycloak (OIDC provider)
  # -----------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.0.5}
    env_file:
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      # Admin bootstrap (Keycloak 26 acepta KC_* y también KEYCLOAK_ADMIN* con warning)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

    command:
      - start
      - --http-enabled=true
      - --http-port=8080
      - --hostname=keycloak.localtest.me
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      - --health-enabled=true
      - --import-realm # [FIX] Importa /opt/keycloak/data/import/*.json en el arranque

    volumes:
      - ../keycloak/import:/opt/keycloak/data/import:ro # [FIX] Realm import (no commitear)

    depends_on:
      keycloak-db:
        condition: service_healthy

    networks:
      - asrp-edge
      - asrp-back

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -lc 'exec 3<>/dev/tcp/127.0.0.1/9000 || exit 1; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \"200\"'", # [FIX] evita usar $line (Compose lo intenta interpolar)
        ]
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 2m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # -----------------------------
  # keycloak-db (PostgreSQL)
  # -----------------------------
  keycloak-db:
    image: postgres:${POSTGRES_VERSION:-16}
    env_file:
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

    networks:
      - asrp-back

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d keycloak"]
      interval: 10s
      timeout: 3s
      retries: 20

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------
  # catalog-db (PostgreSQL)
  # -----------------------------
  catalog-db:
    image: postgres:${POSTGRES_VERSION:-16}
    env_file:
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalog}
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    networks:
      - asrp-back
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME:-catalog}"]
      interval: 10s
      timeout: 3s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------
  # orders-db (PostgreSQL)
  # -----------------------------
  orders-db:
    image: postgres:${POSTGRES_VERSION:-16}
    env_file:
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      POSTGRES_DB: ${ORDERS_DB_NAME:-orders}
      POSTGRES_USER: ${ORDERS_DB_USER}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    networks:
      - asrp-back
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDERS_DB_USER} -d ${ORDERS_DB_NAME:-orders}"]
      interval: 10s
      timeout: 3s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------
  # catalog-api (FastAPI)
  # -----------------------------
  catalog-api:
    # CAMBIO: ruta real según tu repo
    build:
      context: ../services/catalog-api
      dockerfile: Dockerfile
    image: asrp/catalog-api:${ASRP_IMAGE_TAG:-dev}
    env_file:
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      SERVICE_NAME: catalog-api
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-Id}
      # [FIX] el token M2M trae aud=["asrp-catalog","account"]
      OIDC_AUDIENCE: asrp-catalog

      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-http://keycloak:8080/realms/asrp/.well-known/openid-configuration}  # [FIX] discovery interno
      OIDC_ISSUER_EXPECTED: ${OIDC_ISSUER_EXPECTED:-${OIDC_ISSUER_URL}}  # [FIX] iss esperado
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/asrp/protocol/openid-connect/certs}  # [FIX] JWKS interno (evita DNS externo)

    depends_on:
      catalog-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

    networks:
      - asrp-back

    healthcheck:
      # Ajusta si tu health es /healthz; ahora asumimos /health
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2); sys.exit(0 if r.status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 15

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # -----------------------------
  # orders-api (FastAPI)
  # -----------------------------
  orders-api:
    # CAMBIO: ruta real según tu repo
    build:
      context: ../services/orders-api
      dockerfile: Dockerfile
    image: asrp/orders-api:${ASRP_IMAGE_TAG:-dev}
    env_file:
      - ../env/.env.prod
      - ../env/.secrets.env
    environment:
      SERVICE_NAME: orders-api
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-Id}
      # [FIX] para tokens M2M de orders (aud esperado)
      OIDC_AUDIENCE: asrp-orders

      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-http://keycloak:8080/realms/asrp/.well-known/openid-configuration}  # [FIX] discovery interno
      OIDC_ISSUER_EXPECTED: ${OIDC_ISSUER_EXPECTED:-${OIDC_ISSUER_URL}}  # [FIX] iss esperado
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/asrp/protocol/openid-connect/certs}  # [FIX] JWKS interno (evita DNS externo)

    depends_on:
      orders-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

    networks:
      - asrp-back

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2); sys.exit(0 if r.status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 15

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # -----------------------------
  # Frontend prod-like (Vite build -> NGINX)
  # -----------------------------
  frontend-web:
    # [FIX] Frontend prod-like (Vite build -> NGINX unprivileged)
    build:
      context: ../apps/asrp-frontend
      dockerfile: Dockerfile
      args:
        VITE_OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: asrp/frontend-web:${ASRP_IMAGE_TAG:-dev}

    depends_on:
      api-gateway:
        condition: service_healthy

    ports:
      # [FIX] host 5173 -> container 8080 (nginx unprivileged)
      - "5173:8080"

    networks:
      - asrp-edge

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

volumes:
  catalog_db_data:
  orders_db_data:
  keycloak_db_data:

networks:
  asrp-edge:
  asrp-back:
